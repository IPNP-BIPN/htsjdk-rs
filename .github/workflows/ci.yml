      - name: Regenerate the VCF record goldens
        run: |
          docker run --rm --platform linux/amd64 \
            -v "$PWD/tools/vcf-conformance":/harness:ro -w /work htsjdk-rs-oracle:4.2.0 \
            'cp /harness/VcfRecordDump.java . && javac -cp "$ORACLE_CP" -d . VcfRecordDump.java \
             && java -cp ".:$ORACLE_CP" VcfRecordDump' > /tmp/vcfrec_real.txt
          wc -l /tmp/vcfrec_real.txt

      - name: Compare the VCF record goldens against the committed ones
        run: |
          python3 - <<'PY'
          import sys, gzip
          def parse(path, open_fn=open):
              d = {}
              for line in open_fn(path):
                  if line.startswith('#'): continue
                  p = line.rstrip('\n').split('\t', 1)
                  if len(p) < 2: continue
                  d[p[0]] = p[1]
              return d
          real = parse('/tmp/vcfrec_real.txt')
          committed = parse('crates/htsjdk-vcf/tests/data/vcf_record.txt.gz',
                            lambda p: gzip.open(p, 'rt'))
          if set(real) != set(committed):
