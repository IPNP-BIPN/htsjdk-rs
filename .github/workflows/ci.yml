              sys.exit(1)
          bad = [k for k in real if real[k] != committed[k]]
          print(f"compared={len(real)} mismatches={len(bad)}")
          for k in bad[:10]: print(f"  {k}")
          sys.exit(1 if bad else 0)
          PY

      - name: Regenerate the read-group-checksum golden
        run: |
          docker run --rm --platform linux/amd64 \
            -v "$PWD/tools/rg-checksum-conformance":/harness:ro -w /work htsjdk-rs-oracle:4.2.0 \
            'cp /harness/RgChecksumDump.java . && javac -cp "$ORACLE_CP" -d . RgChecksumDump.java \
