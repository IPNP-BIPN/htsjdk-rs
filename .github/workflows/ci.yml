          wc -l /tmp/cigarclip_real.txt

      - name: Compare the CigarUtil soft-clip golden against the committed one
        run: |
          python3 - <<'PY'
          import sys, gzip
          def parse(path, open_fn=open):
              d = {}
              for line in open_fn(path):
                  if line.startswith('#'): continue
                  p = line.rstrip('\n').split('\t', 2)
                  if len(p) < 3: continue
                  d[(p[0], p[1])] = p[2]
              return d
          real = parse('/tmp/cigarclip_real.txt')
          committed = parse('crates/htsjdk-bam/tests/data/cigar_clip.txt.gz',
                            lambda p: gzip.open(p, 'rt'))
          if set(real) != set(committed):
              print("case sets differ:", sorted(set(real) ^ set(committed))[:5])
              sys.exit(1)
          bad = [k for k in real if real[k] != committed[k]]
          print(f"compared={len(real)} mismatches={len(bad)}")
          for k in bad[:10]: print(f"  {k}: real={real[k]} committed={committed[k]}")
          sys.exit(1 if bad else 0)
          PY

      - name: Regenerate the setMateInfo golden
        run: |
          docker run --rm --platform linux/amd64 \
            -v "$PWD/tools/mateinfo-conformance":/harness:ro -w /work htsjdk-rs-oracle:4.2.0 \
            'cp /harness/SetMateInfoDump.java . && javac -cp "$ORACLE_CP" -d . SetMateInfoDump.java \
             && java -cp ".:$ORACLE_CP" SetMateInfoDump' > /tmp/mateinfo_real.txt
          wc -l /tmp/mateinfo_real.txt

      - name: Compare the setMateInfo golden against the committed one
        run: |
          python3 - <<'PY'
          import sys, gzip
          def parse(path, open_fn=open):
              d = {}
              for line in open_fn(path):
                  if line.startswith('#'): continue
                  p = line.rstrip('\n').split('\t', 2)
                  if len(p) < 3: continue
                  d[(p[0], p[1])] = p[2]
              return d
          real = parse('/tmp/mateinfo_real.txt')
          committed = parse('crates/htsjdk-bam/tests/data/set_mate_info.txt.gz',
                            lambda p: gzip.open(p, 'rt'))
          if set(real) != set(committed):
              print("case sets differ:", sorted(set(real) ^ set(committed))[:5])
              sys.exit(1)
          bad = [k for k in real if real[k] != committed[k]]
          print(f"compared={len(real)} mismatches={len(bad)}")
          for k in bad[:10]: print(f"  {k}: real={real[k]} committed={committed[k]}")
          sys.exit(1 if bad else 0)
          PY

      - name: "Decision 0019: is re-sorting a sorted VCF header still a no-op?"
        # The port relies on it: writing a header that has already been through the comparator
        # once must not reorder it. Measured stable, not proven stable, so it is re-measured.
        run: |
          docker run --rm --platform linux/amd64 \
            -v "$PWD/tools/vcf-conformance":/harness:ro -w /work htsjdk-rs-oracle:4.2.0 \
            'cp /harness/ResortProbe.java . && javac -cp "$ORACLE_CP" -d . ResortProbe.java \
             && java -cp ".:$ORACLE_CP" ResortProbe' 2>/dev/null | tee /tmp/resort.txt
          grep -q 'CYCLIC_RESORT_STABLE=true' /tmp/resort.txt || {
            echo "Re-sorting a cyclic header is no longer stable. Decision 0019 needs revisiting."
            exit 1
          }
          grep -q 'REALISTIC_RESORT_STABLE=true' /tmp/resort.txt || {
            echo "Re-sorting a realistic dictionary is no longer stable."
            exit 1
          }

      - name: "Decision 0016: is the VCF header comparator still inconsistent?"
        # The cycle is the reason the port uses a total order where htsjdk has none. If a future
        # htsjdk made the comparator consistent, this fails and the divergence can be removed.
        run: |
          docker run --rm --platform linux/amd64 \
            -v "$PWD/tools/vcf-conformance":/harness:ro -w /work htsjdk-rs-oracle:4.2.0 \
            'cp /harness/ContigOrderProbe.java . && javac -cp "$ORACLE_CP" -d . ContigOrderProbe.java \
             && java -cp ".:$ORACLE_CP" ContigOrderProbe' 2>/dev/null | tee /tmp/cycle.txt
          grep -q 'SAME_OUTPUT=false' /tmp/cycle.txt || {
            echo "The comparator is now consistent. Decision 0016 can be revisited."
            exit 1
          }

  pow-portability:
    name: "Decision 0007: is Math.pow stable across silicon?"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Record the host CPU
        # The whole point of this job. rcpps is specified by an error bound, not by exact
        # results, so the vendor and model are the experiment's independent variable.
        run: |
          grep -m1 'model name' /proc/cpuinfo
          grep -m1 'vendor_id' /proc/cpuinfo

      - name: Build the oracle image
        run: docker build --platform linux/amd64 -t htsjdk-rs-oracle:4.2.0 tools/oracle

      - name: Regenerate the math corpus on real silicon
        run: |
          curl -fsSL -o /tmp/commons-math3.jar \
            https://repo1.maven.org/maven2/org/apache/commons/commons-math3/3.6.1/commons-math3-3.6.1.jar
          echo "1e56d7b058d28b65abd256b8458e3885b674c1d588fa43cd7d1cbb9c7ef2b308  /tmp/commons-math3.jar" | sha256sum -c -
          mkdir -p /tmp/out
          docker run --rm --platform linux/amd64 \
            -v "$PWD/tools/jmath-conformance":/harness:ro -v /tmp:/j:ro -v /tmp/out:/out \
            -w /work htsjdk-rs-oracle:4.2.0 \
            'cp /harness/JMathDump.java . && javac -cp /j/commons-math3.jar -d . JMathDump.java \
             && java -cp .:/j/commons-math3.jar JMathDump /out/jmath.csv'
          wc -l /tmp/out/jmath.csv

      - name: "Is pow(x, 2) exactly x * x?"
        # Histogram.getStandardDeviation calls pow(value - mean, 2), which puts the deferred
        # pow intrinsic on the Phase 1 critical path. If the two agree, Histogram can be ported
        # with multiplication and the deferral holds. Measured here rather than assumed.
        run: |
          docker run --rm --platform linux/amd64 \
            -v "$PWD/tools/pow-probe":/harness:ro -w /work htsjdk-rs-oracle:4.2.0 \
            'cp /harness/PowSq.java . && javac -d . PowSq.java && java PowSq' | tee /tmp/powsq.txt
          grep -q 'differ=0$' /tmp/powsq.txt || {
            echo "pow(x, 2) is NOT x * x on this silicon. Histogram cannot use multiplication."
            exit 1
          }

      - name: Diff every function against the emulated corpus
        # Expectation from decision 0007: exp, log, log10 and sqrt agree, because none of them
        # depends on an unrefined approximate instruction. pow is the one under test.
        run: |
          python3 - <<'PY'
          import gzip, collections, sys
          def load(open_fn, path):
              d = {}
              with open_fn(path) as fh:
                  for line in fh:
                      if line.startswith('#'): continue
                      p = line.rstrip('\n').split(',')
                      if len(p) < 3: continue
                      d[(p[0], p[1])] = p[2]
              return d
          emulated = load(lambda p: gzip.open(p, 'rt'), 'crates/jmath/tests/data/jmath.csv.gz')
          real = load(open, '/tmp/out/jmath.csv')
          shared = set(emulated) & set(real)
          diff = collections.Counter(k[0] for k in shared if emulated[k] != real[k])
          total = collections.Counter(k[0] for k in shared)
          print(f"{'fn':<8} {'compared':>10} {'differing':>10}")
          for fn in sorted(total):
              print(f"{fn:<8} {total[fn]:>10} {diff.get(fn, 0):>10}")
          safe = [f for f in ('exp', 'log', 'log10', 'sqrt') if diff.get(f, 0)]
          if safe:
              print(f"\nFAIL: {safe} differ between emulated and real silicon. These are ported "
                    f"and asserted exact, so their goldens are now invalid.")
              sys.exit(1)
          if diff.get('pow', 0):
              print(f"\nDecision 0007 outcome: pow DIFFERS on real silicon "
                    f"({diff['pow']} of {total['pow']} points). The emulated pow column "
                    f"describes Rosetta, not hardware. Oracle for pow must move to real x86-64.")
              sys.exit(1)
          vendor = "unknown"
          for line in open('/proc/cpuinfo'):
              if line.startswith('vendor_id'):
                  vendor = line.split(':')[1].strip(); break
          print(f"\nDecision 0007 outcome: pow agrees between the emulated corpus and this "
                f"real host ({vendor}). Other vendors remain untested.")
          PY
