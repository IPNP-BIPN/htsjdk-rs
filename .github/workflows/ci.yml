      - name: Regenerate the CigarUtil soft-clip golden
        run: |
          docker run --rm --platform linux/amd64 \
            -v "$PWD/tools/cigar-conformance":/harness:ro -w /work htsjdk-rs-oracle:4.2.0 \
            'cp /harness/CigarClipDump.java . && javac -cp "$ORACLE_CP" -d . CigarClipDump.java \
