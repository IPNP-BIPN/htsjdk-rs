name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test on real x86-64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Record the host CPU
        # Which silicon produced a result is part of its provenance, and decision 0007 makes
        # the vendor specifically relevant.
        run: |
          grep -m1 'model name' /proc/cpuinfo
          grep -m1 'vendor_id' /proc/cpuinfo
          grep -m1 '^flags' /proc/cpuinfo | tr ' ' '\n' | grep -E '^(avx|avx2|avx512f|fma)$' | sort | tr '\n' ' '
          echo

      - uses: dtolnay/rust-toolchain@master
        with:
          # Pinned; must match rust-toolchain.toml.
          toolchain: "1.97.1"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Every ported symbol comes from a licence-compatible source
        # Decision 0014: an operation-by-operation transcription of GPL2-only HotSpot source
        # was published in this MIT crate and found eleven commits later by reading module
        # headers. This makes that reading mechanical so the next one fails here instead.
        run: python3 tools/audit/provenance.py crates

      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --release

      - name: Builds are reproducible
        # Two clean builds of the same source must produce the same bytes. A build that is not
        # reproducible cannot support a claim that its output is.
        run: |
          cargo build --release -p htsjdk-bgzf
          find target/release -maxdepth 1 -name 'libhtsjdk_bgzf*.rlib' -exec sha256sum {} \; > /tmp/build1.txt
          cargo clean
          cargo build --release -p htsjdk-bgzf
          find target/release -maxdepth 1 -name 'libhtsjdk_bgzf*.rlib' -exec sha256sum {} \; > /tmp/build2.txt
          diff <(cut -d' ' -f1 /tmp/build1.txt) <(cut -d' ' -f1 /tmp/build2.txt) \
            && echo "reproducible" \
            || { echo "BUILD IS NOT REPRODUCIBLE"; exit 1; }

  oracle-on-real-silicon:
    name: Regenerate goldens on real x86-64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Record the host CPU
        run: |
          grep -m1 'model name' /proc/cpuinfo
          grep -m1 'vendor_id' /proc/cpuinfo

      - name: Build the oracle image
        # The image runs OracleProbe during its own build, so a degraded environment cannot
        # produce an image at all, let alone a golden.
        run: docker build --platform linux/amd64 -t htsjdk-rs-oracle:4.2.0 tools/oracle

      - name: Regenerate the BGZF goldens
        run: |
          docker run --rm --platform linux/amd64 \
            -v "$PWD/tools/bgzf-conformance":/harness:ro -w /work htsjdk-rs-oracle:4.2.0 \
            'cp /harness/B.java . && javac -cp "$ORACLE_CP" -d . B.java \
             && java -cp ".:$ORACLE_CP" B' > /tmp/bgzf_real.txt
          grep -c '^  (' /tmp/bgzf_real.txt

      - name: Compare against the committed goldens
        # The committed goldens were produced under Rosetta on Apple Silicon. If real silicon
        # disagrees, every claim resting on them is void, so this must fail loudly.
        run: |
          python3 - <<'PY'
          import re, sys
          def parse(t):
              return {(m[0], int(m[1])): (int(m[2]), m[3]) for m in
                      re.findall(r'\("(\w+)", (\d+), (\d+), "([0-9a-f]{32})"\)', t)}
          real = parse(open('/tmp/bgzf_real.txt').read())
          committed = parse(open('crates/htsjdk-bgzf/tests/bgzf_conformance.rs').read())
          shared = set(real) & set(committed)
          bad = [k for k in shared if real[k] != committed[k]]
          print(f"real={len(real)} committed={len(committed)} compared={len(shared)} mismatches={len(bad)}")
          for k in bad[:10]:
              print(f"  {k}: real={real[k]} committed={committed[k]}")
          sys.exit(1 if bad or not shared else 0)
          PY

      - name: Regenerate the BGZF termination goldens
        run: |
          docker run --rm --platform linux/amd64 \
            -v "$PWD/tools/bgzf-conformance":/harness:ro -w /work htsjdk-rs-oracle:4.2.0 \
            'cp /harness/Term.java . && javac -cp "$ORACLE_CP" -d . Term.java \
             && java -cp ".:$ORACLE_CP" Term' > /tmp/term_real.txt
          grep -c '^  (' /tmp/term_real.txt

      - name: Compare the termination goldens against the committed ones
        run: |
          python3 - <<'PY'
          import re, sys
          def parse(t):
              return {(m[0], m[1]): m[2] for m in
                      re.findall(r'\("(\w+)", "(\w+)", "(\w+)"\)', t)}
          real = parse(open('/tmp/term_real.txt').read())
          committed = parse(open('crates/htsjdk-bgzf/tests/termination_conformance.rs').read())
          shared = set(real) & set(committed)
          bad = [k for k in shared if real[k] != committed[k]]
          print(f"real={len(real)} committed={len(committed)} compared={len(shared)} mismatches={len(bad)}")
          for k in bad[:10]:
              print(f"  {k}: real={real[k]} committed={committed[k]}")
          sys.exit(1 if bad or not shared else 0)
          PY

      - name: Regenerate the BAM codec goldens
        run: |
          docker run --rm --platform linux/amd64 \
            -v "$PWD/tools/bam-conformance":/harness:ro -w /work htsjdk-rs-oracle:4.2.0 \
            'cp /harness/BamCodecDump.java . && javac -cp "$ORACLE_CP" -d . BamCodecDump.java \
             && java -cp ".:$ORACLE_CP" BamCodecDump' > /tmp/bam_real.txt
          grep -c $'\t' /tmp/bam_real.txt

      - name: Compare the BAM goldens against the committed ones
        # The BAM record codec is pure integer work, so unlike the math corpus there is no
        # reason to expect emulation to change it. That is the hypothesis; this measures it,
        # because "no reason to expect" is how decision 0004's wrong assumption got in.
        run: |
          python3 - <<'PY'
          import sys, gzip
          def parse(path, open_fn=open):
              d = {}
              for line in open_fn(path):
                  if line.startswith('#') or '\t' not in line: continue
                  name, hexes = line.rstrip('\n').split('\t', 1)
                  d[name] = hexes
              return d
          real = parse('/tmp/bam_real.txt')
          committed = parse('crates/htsjdk-bam/tests/data/bam_codec.txt.gz',
                            lambda p: gzip.open(p, 'rt'))
          if set(real) != set(committed):
              print(f"case sets differ: only-real={sorted(set(real)-set(committed))[:5]} "
                    f"only-committed={sorted(set(committed)-set(real))[:5]}")
              sys.exit(1)
          bad = [k for k in real if real[k] != committed[k]]
          print(f"compared={len(real)} mismatches={len(bad)}")
          for k in bad[:10]:
              print(f"  {k}")
          sys.exit(1 if bad else 0)
          PY

      - name: Regenerate the BAM file and header goldens
        run: |
          docker run --rm --platform linux/amd64 \
            -v "$PWD/tools/bam-conformance":/harness:ro -w /work htsjdk-rs-oracle:4.2.0 \
            'cp /harness/BamFileDump.java . && javac -cp "$ORACLE_CP" -d . BamFileDump.java \
             && java -cp ".:$ORACLE_CP" BamFileDump' > /tmp/bamfile_real.txt
          wc -l /tmp/bamfile_real.txt

      - name: Compare the BAM file goldens against the committed ones
        # These carry compressed bytes, so unlike the record codec they do depend on the
        # deflate implementation. Decision 0001 pins it; this is what would catch that pin
        # coming loose.
        run: |
          python3 - <<'PY'
          import sys, gzip
          def parse(path, open_fn=open):
              d = {}
              for line in open_fn(path):
                  if line.startswith('#'): continue
                  parts = line.rstrip('\n').split('\t', 2)
                  if len(parts) < 3: continue
                  d[(parts[0], parts[1])] = parts[2]
              return d
          real = parse('/tmp/bamfile_real.txt')
          committed = parse('crates/htsjdk-bam/tests/data/bam_file.txt.gz',
                            lambda p: gzip.open(p, 'rt'))
          if set(real) != set(committed):
              print(f"case sets differ: {sorted(set(real) ^ set(committed))[:5]}")
              sys.exit(1)
          bad = [k for k in real if real[k] != committed[k]]
          print(f"compared={len(real)} mismatches={len(bad)}")
          for k in bad[:10]:
              print(f"  {k}")
          sys.exit(1 if bad else 0)
          PY

      - name: Regenerate the Histogram goldens
        run: |
          docker run --rm --platform linux/amd64 \
            -v "$PWD/tools/histogram-conformance":/harness:ro -w /work htsjdk-rs-oracle:4.2.0 \
            'cp /harness/HistogramDump.java . && javac -cp "$ORACLE_CP" -d . HistogramDump.java \
             && java -cp ".:$ORACLE_CP" HistogramDump' > /tmp/hist_real.txt
          wc -l /tmp/hist_real.txt

      - name: Compare the Histogram goldens against the committed ones
        run: |
          python3 - <<'PY'
          import sys, gzip
          def parse(path, open_fn=open):
              d = {}
              for line in open_fn(path):
                  if line.startswith('#'): continue
                  p = line.rstrip('\n').split('\t')
                  if len(p) < 3: continue
                  d[(p[0], p[1])] = p[2]
              return d
          real = parse('/tmp/hist_real.txt')
          committed = parse('crates/htsjdk-metrics/tests/data/histogram.txt.gz',
                            lambda p: gzip.open(p, 'rt'))
          if set(real) != set(committed):
              print(f"case sets differ: {sorted(set(real) ^ set(committed))[:5]}")
              sys.exit(1)
          bad = [k for k in real if real[k] != committed[k]]
          print(f"compared={len(real)} mismatches={len(bad)}")
          for k in bad[:10]: print(f"  {k}: real={real[k]} committed={committed[k]}")
          sys.exit(1 if bad else 0)
          PY

      - name: Regenerate the SAM text goldens
        run: |
          docker run --rm --platform linux/amd64 \
            -v "$PWD/tools/sam-text-conformance":/harness:ro -w /work htsjdk-rs-oracle:4.2.0 \
            'cp /harness/SamTextDump.java . && javac -cp "$ORACLE_CP" -d . SamTextDump.java \
             && java -cp ".:$ORACLE_CP" SamTextDump' > /tmp/samtext_real.txt
          wc -l /tmp/samtext_real.txt

      - name: Compare the SAM text goldens against the committed ones
        run: |
          python3 - <<'PY'
          import sys, gzip
          def parse(path, open_fn=open):
              d = {}
              for line in open_fn(path):
                  if line.startswith('#'): continue
                  p = line.rstrip('\n').split('\t', 1)
                  if len(p) < 2: continue
                  d[p[0]] = p[1]
              return d
          real = parse('/tmp/samtext_real.txt')
          committed = parse('crates/htsjdk-bam/tests/data/sam_text.txt.gz',
                            lambda p: gzip.open(p, 'rt'))
          if set(real) != set(committed):
              print(f"case sets differ: {sorted(set(real) ^ set(committed))[:5]}")
              sys.exit(1)
          bad = [k for k in real if real[k] != committed[k]]
          print(f"compared={len(real)} mismatches={len(bad)}")
          for k in bad[:10]: print(f"  {k}")
          sys.exit(1 if bad else 0)
          PY

      - name: Regenerate the whole-SAM-file goldens
        run: |
          docker run --rm --platform linux/amd64 \
            -v "$PWD/tools/sam-text-conformance":/harness:ro -w /work htsjdk-rs-oracle:4.2.0 \
            'cp /harness/SamFileDump.java . && javac -cp "$ORACLE_CP" -d . SamFileDump.java \
             && java -cp ".:$ORACLE_CP" SamFileDump' > /tmp/samfile_real.txt
          wc -l /tmp/samfile_real.txt

      - name: Compare the whole-SAM-file goldens against the committed ones
        run: |
          python3 - <<'PY'
          import sys, gzip
          def parse(path, open_fn=open):
              d = {}
              for line in open_fn(path):
                  if line.startswith('#'): continue
                  p = line.rstrip('\n').split('\t', 2)
                  if len(p) < 3: continue
                  d[(p[0], p[1])] = p[2]
              return d
          real = parse('/tmp/samfile_real.txt')
          committed = parse('crates/htsjdk-bam/tests/data/sam_file.txt.gz',
                            lambda p: gzip.open(p, 'rt'))
          if set(real) != set(committed):
              print(f"case sets differ: {sorted(set(real) ^ set(committed))[:5]}")
              sys.exit(1)
          bad = [k for k in real if real[k] != committed[k]]
          print(f"compared={len(real)} mismatches={len(bad)}")
          for k in bad[:10]: print(f"  {k}")
          sys.exit(1 if bad else 0)
          PY

      - name: Regenerate the BAI goldens
        run: |
          docker run --rm --platform linux/amd64 \
            -v "$PWD/tools/bam-conformance":/harness:ro -w /work htsjdk-rs-oracle:4.2.0 \
            'cp /harness/BaiDump.java . && javac -cp "$ORACLE_CP" -d . BaiDump.java \
             && java -cp ".:$ORACLE_CP" BaiDump' > /tmp/bai_real.txt
          wc -l /tmp/bai_real.txt

      - name: Compare the BAI goldens against the committed ones
        run: |
          python3 - <<'PY'
          import sys, gzip
          def parse(path, open_fn=open):
              d = {}
              for line in open_fn(path):
                  if line.startswith('#'): continue
                  parts = line.rstrip('\n').split('\t', 2)
                  if len(parts) < 3: continue
                  d[(parts[0], parts[1])] = parts[2]
              return d
          real = parse('/tmp/bai_real.txt')
          committed = parse('crates/htsjdk-bam/tests/data/bai.txt.gz',
                            lambda p: gzip.open(p, 'rt'))
          if set(real) != set(committed):
              print(f"case sets differ: {sorted(set(real) ^ set(committed))[:5]}")
              sys.exit(1)
          bad = [k for k in real if real[k] != committed[k]]
          print(f"compared={len(real)} mismatches={len(bad)}")
          for k in bad[:10]:
              print(f"  {k}")
          sys.exit(1 if bad else 0)
          PY

      - name: Regenerate the interval-list goldens
        run: |
          docker run --rm --platform linux/amd64 \
            -v "$PWD/tools/interval-conformance":/harness:ro -w /work htsjdk-rs-oracle:4.2.0 \
            'cp /harness/IntervalListDump.java . && javac -cp "$ORACLE_CP" -d . IntervalListDump.java \
             && java -cp ".:$ORACLE_CP" IntervalListDump' > /tmp/il_real.txt
          wc -l /tmp/il_real.txt

      - name: Compare the interval-list goldens against the committed ones
        run: |
          python3 - <<'PY'
          import sys, gzip
          def parse(path, open_fn=open):
              d = {}
              for line in open_fn(path):
                  if line.startswith('#'): continue
                  p = line.rstrip('\n').split('\t', 1)
                  d[p[0]] = p[1] if len(p) > 1 else ''
              return d
          real = parse('/tmp/il_real.txt')
          committed = parse('crates/htsjdk-bam/tests/data/interval_list.txt.gz',
                            lambda p: gzip.open(p, 'rt'))
          if set(real) != set(committed):
              print(f"case sets differ: {sorted(set(real) ^ set(committed))[:5]}")
              sys.exit(1)
          bad = [k for k in real if real[k] != committed[k]]
          print(f"compared={len(real)} mismatches={len(bad)}")
          for k in bad[:10]: print(f"  {k}")
          sys.exit(1 if bad else 0)
          PY

      - name: Regenerate the VCF header goldens
        run: |
          docker run --rm --platform linux/amd64 \
            -v "$PWD/tools/vcf-conformance":/harness:ro -w /work htsjdk-rs-oracle:4.2.0 \
            'cp /harness/VcfHeaderDump.java . && javac -cp "$ORACLE_CP" -d . VcfHeaderDump.java \
             && java -cp ".:$ORACLE_CP" VcfHeaderDump' > /tmp/vcfhdr_real.txt
          wc -l /tmp/vcfhdr_real.txt

      - name: Compare the VCF header goldens against the committed ones
        run: |
          python3 - <<'PY'
          import sys, gzip
          def parse(path, open_fn=open):
              d = {}
              for line in open_fn(path):
                  if line.startswith('#'): continue
                  p = line.rstrip('\n').split('\t', 1)
                  if len(p) < 2: continue
                  d[p[0]] = p[1]
              return d
          real = parse('/tmp/vcfhdr_real.txt')
          committed = parse('crates/htsjdk-vcf/tests/data/vcf_header.txt.gz',
                            lambda p: gzip.open(p, 'rt'))
          if set(real) != set(committed):
              print(f"case sets differ: {sorted(set(real) ^ set(committed))[:5]}")
              sys.exit(1)
          bad = [k for k in real if real[k] != committed[k]]
          print(f"compared={len(real)} mismatches={len(bad)}")
          for k in bad[:10]: print(f"  {k}")
